[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "LOG", # logging best practices
]
ignore = [
    "S101",  # allow assert in tests
    "B008",  # FastAPI Depends() in function args is fine
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "B"]  # relax security checks in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
